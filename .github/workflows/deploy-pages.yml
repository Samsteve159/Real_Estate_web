name: Deploy Fresh_Build site to GitHub Pages

# Preview deploy of the V2 agency site (Fresh_Build/site-v2, Vite + React)
# to GitHub Pages. Repointed from Fresh_Build/site (V1) to V2 on 2026-07-02 — the
# single Pages site now serves V2, so V1 is no longer deployed.
# Pages enabled via Settings -> Source: GitHub Actions (2026-06-27).
# NOTE: this is a Sameer-hosted PREVIEW for build-phase review (e.g. mobile
# rendering). Production hosting moves under Manifest/Akshay later.
# Backend (/api) does not exist on Pages, so the AI valuation/concierge and
# lead capture will no-op; the deterministic calculators work client-side.
# 2026-07-03: re-trigger — prior run's build succeeded but actions/deploy-pages
# hit a transient Pages-publish failure; this push re-runs the deploy.

on:
  push:
    branches: [main]
    paths:
      - "Fresh_Build/site-v2/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Fresh_Build/site-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Fresh_Build/site-v2/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /Real_Estate_web/
      - name: SPA fallback (serve index.html on deep links) + disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Fresh_Build/site-v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
